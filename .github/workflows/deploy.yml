name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy sources via rsync
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
          ARGS: "-avz --delete --exclude='.env' --exclude='node_modules' --exclude='.next' --exclude='uploads'"
          SOURCE: "./"
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          REMOTE_PORT: ${{ secrets.VPS_PORT }}
          TARGET: "/var/www/hive"

      - name: Build and restart on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          command_timeout: 10m
          script: |
            cd /var/www/hive
            pkill -f 'next build' || true
            sleep 2
            npx prisma generate
            npx prisma migrate deploy
            npm run build
            pm2 restart hive --update-env
            pm2 save
