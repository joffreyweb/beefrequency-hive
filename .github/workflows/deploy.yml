name: Deploy Hive PWA to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /var/www/hive
            git checkout -- .
            git clean -fd
            git pull origin main
            npm install
            npx prisma generate
            npx prisma migrate deploy
            npm run build
            sudo fuser -k 3001/tcp || true
            pm2 restart hive --update-env
